name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runtime_diagnostics:
        description: Print runtime container logs and slow-test durations
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: control-plane-ui/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: |
          uv sync --extra dev
          npm --prefix control-plane-ui ci

      - name: Lint
        run: make lint

      - name: Run full test suite
        run: make test PYTEST_FLAGS="-vv -ra${{ inputs.runtime_diagnostics && ' --durations=25' || '' }}"
        env:
          PYTHONUNBUFFERED: "1"
          RUNTIME_TEST_DEBUG: ${{ inputs.runtime_diagnostics && '1' || '0' }}
          RUNTIME_BUILD: >-
            docker buildx build --load --cache-from=type=gha
            --cache-to=type=gha,mode=max