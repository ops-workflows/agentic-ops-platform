platformConfig:
  existingSecret: my-workflow-repo-platform-config

bootstrap:
  # Generated by `make bootstrap` with target kubernetes. It contains only
  # AGE_IDENTITY, LLM_API_KEY, PG_PASSWORD, and OBJECT_STORE_SECRET_KEY.
  existingSecret: agentic-ops-bootstrap

# Option A: set these non-secret endpoints when Postgres, S3, and Hindsight are
# operated outside this Helm release. They override platform-config.yaml.
platformEnv:
  PG_HOST: postgres.example.internal
  PG_PORT: "5432"
  PG_DB: agentic_ops
  PG_USER: agentic_ops
  OBJECT_STORE_PROVIDER: s3
  OBJECT_STORE_ENDPOINT: s3.example.internal:9000
  OBJECT_STORE_ACCESS_KEY: agentic_ops
  HINDSIGHT_URL: http://hindsight.example.internal:8888

# Option B: set the three enabled flags to true to run local-stack equivalents
# in this namespace. Remove the external platformEnv values above in that mode.
infrastructure:
  postgres:
    enabled: false
  objectStore:
    enabled: false
  hindsight:
    enabled: false
    llmProvider: openai
    llmBaseUrl: https://llm.example.internal/v1
    llmModel: example-chat-model
    embeddingsProvider: openai
    embeddingsBaseUrl: https://llm.example.internal/v1
    embeddingsModel: example-embedding-model

workflowRepo:
  syncPath: /var/lib/agentic-ops/workflow-repo
  mountPath: /app/workflow-repos/my-workflow-repo
  workflowRoot: ""
  workflowRepoPaths: ""
  existingClaim: ""

runtimeBundles:
  root: /var/lib/agentic-ops/releases
  objectStoreBucket: agentic-ops-bundles

images:
  gateway:
    repository: agentic-ops-gateway
    tag: latest
  sessionManager:
    repository: agentic-ops-session-manager
    tag: latest
  controlPlaneUi:
    repository: agentic-ops-control-plane-ui
    tag: latest
  # Every entry under mcps:/connectors: below runs from this ONE image (the
  # chart has no per-service build context, unlike the compose override). To
  # add your own MCP server or connector (see the "custom-example" entries
  # below), build a combined image containing both the public mcps/connectors
  # packages and your own modules, and publish it as this repository:tag.
  mcp:
    repository: my-workflow-repo-mcps
    tag: latest
  connector:
    repository: my-workflow-repo-connectors
    tag: latest

mcps:
  message:
    enabled: true
    module: mcps.core.mcp_message
    port: 8100
  memory:
    enabled: true
    module: mcps.core.mcp_memory
    port: 8103
  platform:
    enabled: true
    module: mcps.core.mcp_platform
    port: 8105
  salesforce:
    enabled: true
    module: mcps.integrations.mcp_salesforce
    port: 8102
  custom-example:
    enabled: false
    module: mcp_custom_example
    port: 8110

connectors:
  gcpPubsub:
    enabled: true
    command:
      - python
      - /app/connectors/gcp-pubsub-connector/main.py
  servicenow:
    enabled: false
    command:
      - python
      - /app/connectors/servicenow-connector/main.py
  custom-example:
    enabled: false
    command:
      - python
      - /app/connectors/custom-connector-example/main.py
    env:
      CONNECTOR_INSTANCE_ID: my-connector-instance
