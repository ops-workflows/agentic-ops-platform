nameOverride: ""
fullnameOverride: ""

imagePullPolicy: IfNotPresent
imagePullSecrets: []

platformConfig:
  # One of existingSecret or existingConfigMap should provide platform-config.yaml.
  existingSecret: ""
  existingConfigMap: ""

bootstrap:
  # Secret holding deployment-only values such as AGE_IDENTITY,
  # LLM_API_KEY, PG_PASSWORD, and OBJECT_STORE_SECRET_KEY.
  # Its contents are injected into platform workloads via envFrom.
  existingSecret: ""

# Non-secret deployment overrides. These win over platform-config.yaml values,
# and are used when connecting to externally managed infrastructure.
platformEnv: {}

# Optional in-cluster stateful dependencies. All are disabled by default; set
# them to true in the workflow repo's k8s-values.yaml to run the local-stack
# equivalents in Kubernetes.
infrastructure:
  postgres:
    enabled: false
    image: pgvector/pgvector:pg16
    database: agentic_ops
    user: agentic_ops
    storageClass: ""
    storageSize: 20Gi
  objectStore:
    enabled: false
    image: minio/minio:latest
    clientImage: minio/mc:latest
    accessKey: agentic_ops
    buckets:
      - agent-memory
      - agentic-ops-bundles
    storageClass: ""
    storageSize: 20Gi
  hindsight:
    enabled: false
    image: ghcr.io/vectorize-io/hindsight:latest
    llmProvider: openai
    llmBaseUrl: ""
    llmModel: ""
    embeddingsProvider: openai
    embeddingsBaseUrl: ""
    embeddingsModel: ""
    storageClass: ""
    storageSize: 10Gi

workflowRepo:
  syncPath: /var/lib/agentic-ops/workflow-repo
  mountPath: /app/workflow-repos/default
  workflowRoot: ""
  workflowRepoPaths: ""
  existingClaim: ""

runtimeBundles:
  root: /var/lib/agentic-ops/releases
  uriTemplate: ""
  objectStoreBucket: ""

images:
  gateway:
    repository: agentic-ops-gateway
    tag: latest
  sessionManager:
    repository: agentic-ops-session-manager
    tag: latest
  controlPlaneUi:
    repository: agentic-ops-control-plane-ui
    tag: latest
  mcp:
    repository: agentic-ops-mcps
    tag: latest
  connector:
    repository: agentic-ops-gateway
    tag: latest

gateway:
  replicas: 1
  port: 8080

sessionManager:
  replicas: 1
  env:
    RUNTIME_LAUNCHER: kubernetes
    KUBERNETES_MEMORY_HELPER_IMAGE: ""

controlPlaneUi:
  replicas: 1
  port: 3000
  env:
    NEXT_PUBLIC_API_URL: http://agentic-ops-gateway:8080

mcps:
  message:
    enabled: true
    module: mcps.core.mcp_message
    port: 8100
  memory:
    enabled: true
    module: mcps.core.mcp_memory
    port: 8103
  platform:
    enabled: true
    module: mcps.core.mcp_platform
    port: 8105
  salesforce:
    enabled: false
    module: mcps.integrations.mcp_salesforce
    port: 8102
  splunk:
    enabled: false
    module: mcps.integrations.mcp_splunk
    port: 8101
  cloudwatch:
    enabled: false
    module: mcps.integrations.mcp_cloudwatch
    port: 8104
  jira:
    enabled: false
    module: mcps.integrations.mcp_jira
    port: 8106

connectors:
  servicenow:
    enabled: false
    command:
      - python
      - /app/connectors/servicenow-connector/main.py

serviceAccount:
  create: true
  name: ""
