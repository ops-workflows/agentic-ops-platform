{{- range $name, $connector := .Values.connectors }}
{{- if $connector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-ops.fullname" $ }}-connector-{{ $name }}
  labels:
    app.kubernetes.io/component: connector
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: connector
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: connector
        app.kubernetes.io/name: {{ $name }}
    spec:
      containers:
        - name: connector-{{ $name }}
          image: {{ $.Values.images.connector.repository }}:{{ $.Values.images.connector.tag }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          command:
            {{- toYaml $connector.command | nindent 12 }}
          env:
            {{- include "agentic-ops.commonEnv" $ | nindent 12 }}
            {{- range $key, $value := $connector.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            {{- include "agentic-ops.commonVolumeMounts" $ | nindent 12 }}
      volumes:
        {{- include "agentic-ops.commonVolumes" $ | nindent 8 }}
---
{{- end }}
{{- end }}
