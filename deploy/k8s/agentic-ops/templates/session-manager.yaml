apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-ops.fullname" . }}-session-manager
  labels:
    app.kubernetes.io/component: session-manager
spec:
  replicas: {{ .Values.sessionManager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: session-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/component: session-manager
    spec:
      {{- include "agentic-ops.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agentic-ops.serviceAccountName" . }}
      containers:
        - name: session-manager
          image: {{ .Values.images.sessionManager.repository }}:{{ .Values.images.sessionManager.tag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            {{- include "agentic-ops.commonEnv" . | nindent 12 }}
            - name: RUNTIME_LAUNCHER
              value: {{ .Values.sessionManager.env.RUNTIME_LAUNCHER | quote }}
            - name: RUNTIME_BUNDLE_URI_TEMPLATE
              value: {{ .Values.runtimeBundles.uriTemplate | quote }}
            - name: RUNTIME_BUNDLE_ROOT
              value: {{ .Values.runtimeBundles.root | quote }}
            - name: RUNTIME_BUNDLE_OBJECT_STORE_BUCKET
              value: {{ .Values.runtimeBundles.objectStoreBucket | quote }}
            - name: KUBERNETES_MEMORY_HELPER_IMAGE
              value: {{ default (printf "%s:%s" .Values.images.sessionManager.repository .Values.images.sessionManager.tag) .Values.sessionManager.env.KUBERNETES_MEMORY_HELPER_IMAGE | quote }}
            - name: KUBERNETES_BOOTSTRAP_SECRET
              value: {{ .Values.bootstrap.existingSecret | quote }}
          {{- if .Values.bootstrap.existingSecret }}
          envFrom:
            {{- include "agentic-ops.bootstrapEnvFrom" . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- include "agentic-ops.commonVolumeMounts" . | nindent 12 }}
      volumes:
        {{- include "agentic-ops.commonVolumes" . | nindent 8 }}
