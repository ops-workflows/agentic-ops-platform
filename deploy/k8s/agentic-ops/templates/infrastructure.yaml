{{- if .Values.infrastructure.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentic-ops.postgresName" . }}-init
  labels:
    app.kubernetes.io/component: postgres
data:
  init_db.sql: |-
{{ .Files.Get "files/init_db.sql" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentic-ops.postgresName" . }}
spec:
  selector:
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agentic-ops.postgresName" . }}
spec:
  serviceName: {{ include "agentic-ops.postgresName" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
    spec:
      {{- include "agentic-ops.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: postgres
          image: {{ .Values.infrastructure.postgres.image }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.infrastructure.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.infrastructure.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrap.existingSecret is required for managed infrastructure" .Values.bootstrap.existingSecret }}
                  key: PG_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d/01-init.sql
              subPath: init_db.sql
              readOnly: true
      volumes:
        - name: init-db
          configMap:
            name: {{ include "agentic-ops.postgresName" . }}-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.infrastructure.postgres.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.infrastructure.postgres.storageSize }}
---
{{- end }}
{{- if .Values.infrastructure.objectStore.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentic-ops.objectStoreName" . }}
spec:
  selector:
    app.kubernetes.io/component: object-store
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "agentic-ops.objectStoreName" . }}
spec:
  serviceName: {{ include "agentic-ops.objectStoreName" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: object-store
  template:
    metadata:
      labels:
        app.kubernetes.io/component: object-store
    spec:
      {{- include "agentic-ops.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: minio
          image: {{ .Values.infrastructure.objectStore.image }}
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.infrastructure.objectStore.accessKey | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrap.existingSecret is required for managed infrastructure" .Values.bootstrap.existingSecret }}
                  key: OBJECT_STORE_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.infrastructure.objectStore.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.infrastructure.objectStore.storageSize }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agentic-ops.objectStoreName" . }}-buckets
spec:
  backoffLimit: 12
  template:
    spec:
      restartPolicy: OnFailure
      {{- include "agentic-ops.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: create-buckets
          image: {{ .Values.infrastructure.objectStore.clientImage }}
          command:
            - /bin/sh
            - -ec
            - |
              until mc alias set local http://{{ include "agentic-ops.objectStoreName" . }}:9000 "$OBJECT_STORE_ACCESS_KEY" "$OBJECT_STORE_SECRET_KEY"; do sleep 2; done
              {{- range .Values.infrastructure.objectStore.buckets }}
              mc mb --ignore-existing local/{{ . }}
              {{- end }}
          env:
            - name: OBJECT_STORE_ACCESS_KEY
              value: {{ .Values.infrastructure.objectStore.accessKey | quote }}
            - name: OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrap.existingSecret is required for managed infrastructure" .Values.bootstrap.existingSecret }}
                  key: OBJECT_STORE_SECRET_KEY
---
{{- end }}
{{- if .Values.infrastructure.hindsight.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentic-ops.hindsightName" . }}
spec:
  selector:
    app.kubernetes.io/component: hindsight
  ports:
    - name: http
      port: 8888
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-ops.hindsightName" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: hindsight
  template:
    metadata:
      labels:
        app.kubernetes.io/component: hindsight
    spec:
      {{- include "agentic-ops.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: hindsight
          image: {{ .Values.infrastructure.hindsight.image }}
          ports:
            - name: http
              containerPort: 8888
          env:
            - name: PG_HOST
              {{- if .Values.infrastructure.postgres.enabled }}
              value: {{ include "agentic-ops.postgresName" . | quote }}
              {{- else }}
              value: {{ required "platformEnv.PG_HOST is required when managed Postgres is disabled" .Values.platformEnv.PG_HOST | quote }}
              {{- end }}
            - name: PG_PORT
              value: {{ default "5432" .Values.platformEnv.PG_PORT | quote }}
            - name: PG_DB
              {{- if .Values.infrastructure.postgres.enabled }}
              value: {{ .Values.infrastructure.postgres.database | quote }}
              {{- else }}
              value: {{ required "platformEnv.PG_DB is required when managed Postgres is disabled" .Values.platformEnv.PG_DB | quote }}
              {{- end }}
            - name: PG_USER
              {{- if .Values.infrastructure.postgres.enabled }}
              value: {{ .Values.infrastructure.postgres.user | quote }}
              {{- else }}
              value: {{ required "platformEnv.PG_USER is required when managed Postgres is disabled" .Values.platformEnv.PG_USER | quote }}
              {{- end }}
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrap.existingSecret is required for managed infrastructure" .Values.bootstrap.existingSecret }}
                  key: PG_PASSWORD
            - name: HINDSIGHT_API_DATABASE_URL
              value: postgresql://$(PG_USER):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/$(PG_DB)
            - name: HINDSIGHT_API_DATABASE_SCHEMA
              value: hindsight
            - name: HINDSIGHT_API_VECTOR_EXTENSION
              value: pgvector
            - name: HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP
              value: "true"
            - name: HINDSIGHT_API_LLM_PROVIDER
              value: {{ .Values.infrastructure.hindsight.llmProvider | quote }}
            - name: HINDSIGHT_API_LLM_BASE_URL
              value: {{ required "infrastructure.hindsight.llmBaseUrl is required when Hindsight is enabled" .Values.infrastructure.hindsight.llmBaseUrl | quote }}
            - name: HINDSIGHT_API_LLM_MODEL
              value: {{ required "infrastructure.hindsight.llmModel is required when Hindsight is enabled" .Values.infrastructure.hindsight.llmModel | quote }}
            - name: HINDSIGHT_API_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrap.existingSecret is required for managed infrastructure" .Values.bootstrap.existingSecret }}
                  key: LLM_API_KEY
            - name: HINDSIGHT_API_EMBEDDINGS_PROVIDER
              value: {{ .Values.infrastructure.hindsight.embeddingsProvider | quote }}
            - name: HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL
              value: {{ required "infrastructure.hindsight.embeddingsBaseUrl is required when Hindsight is enabled" .Values.infrastructure.hindsight.embeddingsBaseUrl | quote }}
            - name: HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL
              value: {{ required "infrastructure.hindsight.embeddingsModel is required when Hindsight is enabled" .Values.infrastructure.hindsight.embeddingsModel | quote }}
            - name: HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrap.existingSecret is required for managed infrastructure" .Values.bootstrap.existingSecret }}
                  key: LLM_API_KEY
            - name: HINDSIGHT_API_FILE_STORAGE_TYPE
              value: native
          volumeMounts:
            - name: data
              mountPath: /home/hindsight/.hindsight
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agentic-ops.hindsightName" . }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agentic-ops.hindsightName" . }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.infrastructure.hindsight.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.infrastructure.hindsight.storageSize }}
{{- end }}
