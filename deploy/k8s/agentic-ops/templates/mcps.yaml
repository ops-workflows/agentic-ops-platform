{{- range $name, $mcp := .Values.mcps }}
{{- if $mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-ops.fullname" $ }}-mcp-{{ $name }}
  labels:
    app.kubernetes.io/component: mcp
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mcp
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mcp
        app.kubernetes.io/name: {{ $name }}
    spec:
      containers:
        - name: mcp-{{ $name }}
          image: {{ $.Values.images.mcp.repository }}:{{ $.Values.images.mcp.tag }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          command: ["python", "-m", "uvicorn", "{{ $mcp.module }}:app", "--host", "0.0.0.0", "--port", "{{ $mcp.port }}"]
          ports:
            - name: http
              containerPort: {{ $mcp.port }}
          env:
            {{- include "agentic-ops.commonEnv" $ | nindent 12 }}
          volumeMounts:
            {{- include "agentic-ops.commonVolumeMounts" $ | nindent 12 }}
      volumes:
        {{- include "agentic-ops.commonVolumes" $ | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentic-ops.fullname" $ }}-mcp-{{ $name }}
spec:
  selector:
    app.kubernetes.io/component: mcp
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: http
      port: {{ $mcp.port }}
      targetPort: http
---
{{- end }}
{{- end }}
