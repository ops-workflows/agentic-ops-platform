apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentic-ops-control-plane-ui
  labels:
    app.kubernetes.io/name: agentic-ops
    app.kubernetes.io/component: control-plane-ui
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      serviceAccountName: "${UI_SERVICE_ACCOUNT}"
      containers:
        - image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/control-plane-ui:${IMAGE_TAG}"
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "${NEXT_PUBLIC_API_URL}"
