apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentic-ops-session-manager
  labels:
    app.kubernetes.io/name: agentic-ops
    app.kubernetes.io/component: session-manager
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
    spec:
      serviceAccountName: "${SESSION_MANAGER_SERVICE_ACCOUNT}"
      containers:
        - image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/session-manager:${IMAGE_TAG}"
          env:
            - name: PLATFORM_CONFIG_FILE
              value: /secrets/platform-config/platform-config.yaml
            - name: WORKFLOW_ROOT
              value: ""
            - name: WORKFLOW_REPO_PATHS
              value: "${WORKFLOW_REPO_PATHS}"
            - name: RUNTIME_LAUNCHER
              value: cloud_run
            - name: CLOUD_RUN_PROJECT
              value: "${PROJECT_ID}"
            - name: CLOUD_RUN_REGION
              value: "${REGION}"
            - name: CLOUD_RUN_JOB_NAME
              value: agentic-ops-runtime
            - name: RUNTIME_BUNDLE_URI_TEMPLATE
              value: "gs://${BUNDLE_BUCKET}/{workflow}"
            - name: GATEWAY_EVENT_URL
              value: "${GATEWAY_EVENT_URL}"
