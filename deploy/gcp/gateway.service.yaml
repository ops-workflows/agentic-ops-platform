apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentic-ops-gateway
  labels:
    app.kubernetes.io/name: agentic-ops
    app.kubernetes.io/component: gateway
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      serviceAccountName: "${GATEWAY_SERVICE_ACCOUNT}"
      containers:
        - image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/gateway:${IMAGE_TAG}"
          ports:
            - containerPort: 8080
          env:
            - name: PLATFORM_CONFIG_FILE
              value: /secrets/platform-config/platform-config.yaml
            - name: WORKFLOW_ROOT
              value: ""
            - name: WORKFLOW_REPO_PATHS
              value: "${WORKFLOW_REPO_PATHS}"
            - name: GATEWAY_PUBLIC_BASE_URL
              value: "${GATEWAY_PUBLIC_BASE_URL}"
