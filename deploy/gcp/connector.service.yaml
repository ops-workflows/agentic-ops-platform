apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: "agentic-ops-connector-${CONNECTOR_NAME}"
  labels:
    app.kubernetes.io/name: agentic-ops
    app.kubernetes.io/component: connector
    app.kubernetes.io/instance: "${CONNECTOR_NAME}"
spec:
  template:
    metadata:
      annotations:
        # Connectors are long-running pollers/subscribers, not request-driven
        # servers -- there's no HTTP traffic to scale on, so keep exactly one
        # instance always running instead of Cloud Run's default
        # scale-to-zero-on-no-traffic behavior.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
    spec:
      serviceAccountName: "${CONNECTOR_SERVICE_ACCOUNT}"
      containers:
        - image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/connectors:${IMAGE_TAG}"
          command:
            - python
            - "/app/connectors/${CONNECTOR_NAME}/main.py"
          ports:
            # Required by Cloud Run even for a non-request-driven process --
            # the connector's main.py must bind this via
            # shared.lib.health_server.start_health_server() (both bundled
            # connectors already do) so Cloud Run's health check passes.
            - containerPort: 8080
          env:
            - name: PLATFORM_CONFIG_FILE
              value: /secrets/platform-config/platform-config.yaml
            - name: CONNECTOR_INSTANCE_ID
              value: "${CONNECTOR_INSTANCE_ID}"
