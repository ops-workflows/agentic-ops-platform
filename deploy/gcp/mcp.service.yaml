apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: "agentic-ops-mcp-${MCP_NAME}"
  labels:
    app.kubernetes.io/name: agentic-ops
    app.kubernetes.io/component: mcp
    app.kubernetes.io/instance: "${MCP_NAME}"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      serviceAccountName: "${MCP_SERVICE_ACCOUNT}"
      containers:
        - image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/mcps:${IMAGE_TAG}"
          command:
            - python
            - -m
            - uvicorn
            - "${MCP_MODULE}:app"
            - --host
            - "0.0.0.0"
            - --port
            - "${MCP_PORT}"
          ports:
            - containerPort: ${MCP_PORT}
          env:
            - name: PLATFORM_CONFIG_FILE
              value: /secrets/platform-config/platform-config.yaml
            - name: GATEWAY_URL
              value: "${GATEWAY_URL}"
            - name: HINDSIGHT_URL
              value: "${HINDSIGHT_URL}"
